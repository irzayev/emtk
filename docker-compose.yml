services:
  smart-zhk:
    build: .
    container_name: smart-zhk-mvp
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - FLASK_DEBUG=0
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./instance:/app/instance
      - ./static/uploads:/app/static/uploads
    restart: unless-stopped
