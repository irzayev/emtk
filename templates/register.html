{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-3">Sakin qeydiyyati</h4>
                <div class="alert alert-info py-2 small">
                    Qeydiyyatdan sonra menzil komendant ve ya administrator terefinden teyin edilir.
                </div>
                <form method="post" class="row g-2">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="col-12">
                        <label class="form-label">Ad Soyad</label>
                        <input class="form-control" name="full_name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Telefon</label>
                        <input class="form-control" name="phone" placeholder="+994XXXXXXXXX" pattern="\+994[0-9]{9}" title="Format: +994XXXXXXXXX">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Sifre</label>
                        <input class="form-control" type="password" name="password" required minlength="6">
                    </div>
                    <div class="col-12 mt-3 d-flex gap-2">
                        <button class="btn btn-primary">Qeydiyyat</button>
                        <a class="btn btn-outline-secondary" href="{{ url_for('login') }}">Giris sehifesi</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
