{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-3">Sakin qeydiyyati</h4>
                <div class="alert alert-info py-2 small">
                    Qeydiyyatdan sonra menzil komendant ve ya administrator terefinden teyin edilir.
                </div>
                <form method="post" class="row g-2" id="registerForm">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input type="hidden" name="phone" id="phoneHidden">
                    <div class="col-12">
                        <label class="form-label">Ad Soyad</label>
                        <input class="form-control" name="full_name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Telefon</label>
                        <div class="input-group">
                            <span class="input-group-text">+994</span>
                            <input class="form-control" type="tel" id="phoneLocal" required
                                   inputmode="numeric" autocomplete="tel-national"
                                   maxlength="9" pattern="[0-9]{9}"
                                   placeholder="XXXXXXXXX" title="9 rəqəm">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" name="email" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Şifrə</label>
                        <input class="form-control" type="password" name="password" id="password" required minlength="6" autocomplete="new-password">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Şifrəni təsdiqləyin</label>
                        <input class="form-control" type="password" name="password_confirm" id="password_confirm" required minlength="6" autocomplete="new-password">
                    </div>
                    <div class="col-12 mt-3 d-flex gap-2">
                        <button class="btn btn-primary">Qeydiyyat</button>
                        <a class="btn btn-outline-secondary" href="{{ url_for('login') }}">Giriş səhifəsi</a>
                    </div>
                </form>
                <script>
                (function () {
                    const form = document.getElementById('registerForm');
                    const local = document.getElementById('phoneLocal');
                    const hidden = document.getElementById('phoneHidden');
                    const fullName = form?.querySelector('input[name="full_name"]');
                    const email = form?.querySelector('input[name="email"]');
                    if (!form || !local || !hidden) return;
                    // Yalnız rəqəmlərə icazə veririk.
                    local.addEventListener('input', () => {
                        local.value = local.value.replace(/\D+/g, '').slice(0, 9);
                    });
                    const p = document.getElementById('password');
                    const pc = document.getElementById('password_confirm');
                    const validityMessages = new Map([
                        [fullName, {
                            valueMissing: 'Ad və soyadı daxil edin.'
                        }],
                        [local, {
                            valueMissing: 'Telefon nömrəsini daxil edin.',
                            patternMismatch: 'Telefon nömrəsi 9 rəqəmdən ibarət olmalıdır.'
                        }],
                        [email, {
                            valueMissing: 'Email ünvanını daxil edin.',
                            typeMismatch: 'Düzgün email ünvanı daxil edin.'
                        }],
                        [p, {
                            valueMissing: 'Şifrəni daxil edin.',
                            tooShort: 'Şifrə ən azı 6 simvol olmalıdır.'
                        }],
                        [pc, {
                            valueMissing: 'Şifrə təsdiqini daxil edin.',
                            tooShort: 'Şifrə ən azı 6 simvol olmalıdır.'
                        }]
                    ]);

                    function applyAzValidityMessage(field) {
                        if (!field) return;
                        field.setCustomValidity('');
                        const messages = validityMessages.get(field);
                        if (!messages) return;
                        const validity = field.validity;
                        if (validity.valueMissing && messages.valueMissing) {
                            field.setCustomValidity(messages.valueMissing);
                        } else if (validity.typeMismatch && messages.typeMismatch) {
                            field.setCustomValidity(messages.typeMismatch);
                        } else if (validity.patternMismatch && messages.patternMismatch) {
                            field.setCustomValidity(messages.patternMismatch);
                        } else if (validity.tooShort && messages.tooShort) {
                            field.setCustomValidity(messages.tooShort);
                        }
                    }

                    function clearFieldValidity(field) {
                        if (field) field.setCustomValidity('');
                    }

                    [fullName, local, email, p, pc].forEach((field) => {
                        if (!field) return;
                        field.addEventListener('input', () => clearFieldValidity(field));
                        field.addEventListener('invalid', () => applyAzValidityMessage(field));
                    });

                    form.addEventListener('submit', (e) => {
                        const v = local.value.replace(/\D+/g, '');
                        hidden.value = v ? ('+994' + v) : '';
                        if (p && pc && p.value !== pc.value) {
                            e.preventDefault();
                            pc.setCustomValidity('Şifrələr üst-üstə düşmür.');
                            pc.reportValidity();
                        } else if (pc) {
                            clearFieldValidity(pc);
                        }
                    });
                })();
                </script>
            </div>
        </div>
    </div>
</div>
{% endblock %}
