{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-3">{{ system_name }} Giris</h4>
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Telefon və ya email</label>
                        <input class="form-control" type="text" name="login" autocomplete="username" placeholder="+994XXXXXXXXX" required>
                        <div class="form-text">İlkin olaraq telefon nömrənizlə daxil olun (+994…). Email də qəbul edilir.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Şifrə</label>
                        <input class="form-control" type="password" name="password" required>
                    </div>
                    <button class="btn btn-primary w-100">Daxil ol</button>
                </form>
                <a class="btn btn-outline-secondary w-100 mt-2" href="{{ url_for('register') }}">Qeydiyyat</a>
                <div class="small text-muted mt-3">
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
