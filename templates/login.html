                        <label class="form-label">Email</label>

                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sifre</label>

                    </div>

                <a class="btn btn-outline-secondary w-100 mt-2" href="{{ url_for('register') }}">Sakin qeydiyyati</a>
                <div class="small text-muted mt-3">
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
