{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
        <div class="card border-0 shadow-none p-4 p-md-5">
            <div class="mb-4">
                <h1 class="h4 fw-bold mb-1 emtk-display">Şifrə dəyiş</h1>
                <p class="text-secondary small mb-0">Mövcud şifrənizi daxil edib yenisini təyin edin.</p>
            </div>
            <form method="post" novalidate>
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label small text-secondary">Mövcud şifrə</label>
                    <input class="form-control" type="password" name="current_password" autocomplete="current-password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-secondary">Yeni şifrə</label>
                    <input class="form-control" type="password" name="new_password" autocomplete="new-password" minlength="6" required>
                    <div class="form-text">Ən az 6 simvol.</div>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-secondary">Yeni şifrəni təsdiqlə</label>
                    <input class="form-control" type="password" name="confirm_password" autocomplete="new-password" minlength="6" required>
                </div>
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-primary rounded-3 px-4" type="submit">Saxla</button>
                    <a class="btn btn-outline-secondary rounded-3" href="{{ url_for('dashboard') }}">Geri</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
