{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-1">Şifrə dəyiş</h4>
                <p class="text-muted small mb-4">Mövcud şifrənizi daxil edib yenisini təyin edin.</p>
                <form method="post" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Mövcud şifrə</label>
                        <input class="form-control" type="password" name="current_password" autocomplete="current-password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Yeni şifrə</label>
                        <input class="form-control" type="password" name="new_password" autocomplete="new-password" minlength="6" required>
                        <div class="form-text">Ən az 6 simvol.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Yeni şifrəni təsdiqlə</label>
                        <input class="form-control" type="password" name="confirm_password" autocomplete="new-password" minlength="6" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Saxla</button>
                        <a class="btn btn-outline-secondary" href="{{ url_for('dashboard') }}">Geri</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
